image: php:8.3-cli

stages:
  - test

before_script:
  - apt-get update -qq
  - apt-get install -y -qq git unzip libcurl4-openssl-dev libonig-dev
  - docker-php-ext-install -j"$(nproc)" curl mbstring
  - php -r "copy('https://composer.github.io/installer.sig', 'composer-setup.sig'); copy('https://getcomposer.org/installer', 'composer-setup.php');"
  - php -r "if (!hash_equals(trim((string) file_get_contents('composer-setup.sig')), hash_file('sha384', 'composer-setup.php'))) { fwrite(STDERR, 'Invalid Composer installer signature.' . PHP_EOL); exit(1); }"
  - php composer-setup.php --install-dir=/usr/local/bin --filename=composer
  - rm composer-setup.php composer-setup.sig
  - composer install --no-interaction --prefer-dist

quality:
  stage: test
  script:
    - composer validate --strict --no-check-publish
    - composer audit --locked --no-interaction
    - composer lint
    - composer cs
    - composer stan
    - composer test
    - ./tools/build-release.sh
  artifacts:
    paths:
      - dist/sevdesk-*.tar.gz
    expire_in: 1 week

integration:
  stage: test
  services:
    - name: mariadb:10.11
      alias: mariadb
      command: ["--sql-mode=NO_ENGINE_SUBSTITUTION"]
  variables:
    MARIADB_DATABASE: sevdesk_test
    MARIADB_USER: sevdesk
    MARIADB_PASSWORD: sevdesk_test
    MARIADB_ROOT_PASSWORD: root_test_only
    SEVDESK_TEST_DB_HOST: mariadb
    SEVDESK_TEST_DB_PORT: "3306"
    SEVDESK_TEST_DB_DATABASE: sevdesk_test
    SEVDESK_TEST_DB_USERNAME: sevdesk
    SEVDESK_TEST_DB_PASSWORD: sevdesk_test
    SEVDESK_TEST_DB_REQUIRED: "1"
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq git unzip libcurl4-openssl-dev libonig-dev
    - docker-php-ext-install -j"$(nproc)" curl mbstring pdo_mysql
    - php -r "copy('https://composer.github.io/installer.sig', 'composer-setup.sig'); copy('https://getcomposer.org/installer', 'composer-setup.php');"
    - php -r "if (!hash_equals(trim((string) file_get_contents('composer-setup.sig')), hash_file('sha384', 'composer-setup.php'))) { fwrite(STDERR, 'Invalid Composer installer signature.' . PHP_EOL); exit(1); }"
    - php composer-setup.php --install-dir=/usr/local/bin --filename=composer
    - rm composer-setup.php composer-setup.sig
    - composer install --no-interaction --prefer-dist
  script:
    - composer test:integration
