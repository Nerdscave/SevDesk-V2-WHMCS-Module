services:
  mariadb:
    image: mariadb:10.11
    command: ["--sql-mode=NO_ENGINE_SUBSTITUTION"]
    environment:
      MARIADB_DATABASE: sevdesk_test
      MARIADB_USER: sevdesk
      MARIADB_PASSWORD: sevdesk_test
      MARIADB_ROOT_PASSWORD: root_test_only
    ports:
      - "127.0.0.1:33079:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/mysql
